<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560">
  <rect width="760" height="560" fill="#f5f7fa"/>
  <text x="52" y="48" font-size="26" font-family="Arial, sans-serif" fill="#17243b">Bark push encryption (example values)</text>
  <rect x="104" y="82" width="552" height="400" rx="10" fill="#fff" stroke="#c9d3df"/>
  <g font-family="Arial, sans-serif">
    <text x="140" y="133" font-size="22" fill="#192840">Push Encryption</text>
    <text x="140" y="184" font-size="17" fill="#53637a">Algorithm</text>
    <rect x="364" y="158" width="235" height="42" rx="5" fill="#edf4fb"/>
    <text x="385" y="186" font-size="17" fill="#192840">AES-128-CBC</text>
    <text x="140" y="248" font-size="17" fill="#53637a">Key (16 chars)</text>
    <rect x="364" y="221" width="235" height="42" rx="5" fill="#edf4fb"/>
    <text x="385" y="249" font-size="17" fill="#192840">****************</text>
    <text x="140" y="312" font-size="17" fill="#53637a">IV (16 chars)</text>
    <rect x="364" y="285" width="235" height="42" rx="5" fill="#edf4fb"/>
    <text x="385" y="313" font-size="17" fill="#192840">****************</text>
    <rect x="140" y="368" width="459" height="66" rx="5" fill="#fff4e6"/>
    <text x="160" y="398" font-size="15" fill="#725326">Use the same Key and IV in gateway.env.</text>
    <text x="160" y="421" font-size="15" fill="#725326">Never publish real values in GitHub.</text>
  </g>
</svg>
