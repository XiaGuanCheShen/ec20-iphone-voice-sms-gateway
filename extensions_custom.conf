; EC20 gateway custom contexts. Issabel preserves this file across GUI-generated config.
[incoming-mobile]
; Persist received SMS and route notifications through Bark/Feishu policy.
exten => sms,1,Set(SMS_SENDER_B64=${BASE64_ENCODE(${CALLERID(num)})})
 same => n,TrySystem(/usr/local/sbin/ec20-sms-bark ${SMS_SENDER_B64} ${SMS_BASE64})
 same => n,Verbose(1,Incoming SMS from ${CALLERID(num)} processed: ${SYSTEMSTATUS})
 same => n,Hangup()

exten => ussd,1,Verbose(1,Incoming USSD: ${BASE64_DECODE(${USSD_BASE64})})
 same => n,Hangup()

exten => report,1,Verbose(1,Incoming report call from ${CALLERID(num)})
 same => n,Hangup()

; Hand normal cellular voice calls to Issabel inbound-route processing.
exten => _.,1,Set(CALLERID(name)=${CALLERID(num)})
 same => n,Goto(from-trunk,${EXTEN},1)
