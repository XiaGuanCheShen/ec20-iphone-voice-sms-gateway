#!/usr/sbin/nft -f

flush ruleset

table inet ec20_filter {
    chain input {
        type filter hook input priority filter; policy drop;

        ct state established,related accept
        ct state invalid drop
        iifname "lo" accept

        # IPv6 control traffic is required for correct routing and MTU handling.
        meta l4proto ipv6-icmp accept
        ip protocol icmp accept
        ip6 saddr fe80::/10 udp dport 546 accept

        # Admin interfaces are reachable only from the home IPv4 network.
        ip saddr @@HOME_IPV4_LAN@@ tcp dport { 22, 80, 443 } accept
        ip saddr @@HOME_IPV4_LAN@@ udp dport { 5160, 10000-10010 } accept

        # Public IPv6 SIP signalling and voice RTP.
        meta nfproto ipv6 udp dport 5160 accept
        meta nfproto ipv6 tcp dport 5160 accept
        meta nfproto ipv6 udp dport 10000-10010 accept
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

